<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abcyara Hub - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .social-checkbox { display: none; }
        .social-label { cursor: pointer; opacity: 0.3; filter: grayscale(100%); transition: 0.2s; }
        .social-checkbox:checked + .social-label { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .yt-icon { color: #FF0000; } .tt-icon { color: #000000; } .ig-icon { color: #E1306C; }
        .fb-icon { color: #1877F2; } .pin-icon { color: #E60023; }
        .custom-scroll::-webkit-scrollbar { height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 p-4 shadow-sm shrink-0">
        <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
            <i class="fa-solid fa-rocket"></i> Abcyara Hub
        </h1>
        <div class="mt-4 overflow-x-auto flex gap-3 pb-2 custom-scroll" id="studio-links-container">
            </div>
    </header>

    <section class="p-4 bg-white border-b border-gray-200">
        <div class="flex flex-col gap-2">
            <input type="text" id="new-video-title" placeholder="Titre de la vidéo..." class="border p-2 rounded-md text-sm outline-none focus:border-indigo-500">
            <div class="flex gap-2">
                <input type="date" id="new-video-date" class="border p-2 rounded-md text-sm flex-1 outline-none">
                <button onclick="addVideoTask()" class="bg-indigo-600 text-white px-4 py-2 rounded-md text-sm font-bold">Ajouter</button>
            </div>
        </div>
    </section>

    <main class="flex-1 p-4 overflow-hidden flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <h2 id="month-display" class="font-bold text-gray-700 capitalize">Mois Année</h2>
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="p-2 bg-white border rounded shadow-sm"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="changeMonth(1)" class="p-2 bg-white border rounded shadow-sm"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-auto custom-scroll bg-white rounded-xl shadow-inner border border-gray-200">
            <div class="grid grid-cols-7 border-b bg-gray-50 text-[10px] font-bold text-center uppercase py-2 sticky top-0 z-10">
                <div>Lun</div><div>Mar</div><div>Mer</div><div>Jeu</div><div>Ven</div><div>Sam</div><div>Dim</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 text-center">
                </div>
        </div>
    </main>

    <script>
        const platforms = [
            { id: 'yt', name: 'YouTube', icon: 'fa-brands fa-youtube yt-icon', url: "https://studio.youtube.com" },
            { id: 'tt', name: 'TikTok', icon: 'fa-brands fa-tiktok tt-icon', url: "https://www.tiktok.com/creators/creator-portal/" },
            { id: 'ig', name: 'Instagram', icon: 'fa-brands fa-instagram ig-icon', url: "https://business.facebook.com/creatorstudio/home" },
            { id: 'fb', name: 'Facebook', icon: 'fa-brands fa-facebook fb-icon', url: "https://business.facebook.com/" },
            { id: 'pin', name: 'Pinterest', icon: 'fa-brands fa-pinterest pin-icon', url: "https://www.pinterest.com/business/hub/" }
        ];

        let appData = JSON.parse(localStorage.getItem('abcyara_v5')) || { tasks: [] };
        let currentViewDate = new Date();

        function renderStudioLinks() {
            const container = document.getElementById('studio-links-container');
            container.innerHTML = platforms.map(p => `
                <a href="${p.url}" target="_blank" class="flex-shrink-0 bg-gray-50 border border-gray-200 p-2 rounded-lg flex items-center gap-2 text-[10px] font-bold">
                    <i class="${p.icon} text-sm"></i> ${p.name}
                </a>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            monthDisplay.innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < startOffset; i++) {
                grid.innerHTML += `<div class="border-b border-r border-gray-100 min-h-[80px] bg-gray-50/50"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayTasks = appData.tasks.filter(t => t.date === dateStr);
                
                let tasksHtml = dayTasks.map(task => `
                    <div class="mt-1 bg-indigo-50 border border-indigo-100 rounded p-1">
                        <div class="text-[8px] font-bold truncate mb-1">${task.title}</div>
                        <div class="flex justify-around">
                            ${platforms.map(p => `
                                <input type="checkbox" id="c-${task.id}-${p.id}" class="social-checkbox" ${task.status[p.id] ? 'checked' : ''} onchange="toggleStatus(${task.id}, '${p.id}', this.checked)">
                                <label for="c-${task.id}-${p.id}" class="social-label text-[10px]"><i class="${p.icon}"></i></label>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="border-b border-r border-gray-100 min-h-[90px] p-1 flex flex-col">
                        <span class="text-[10px] text-gray-400 font-bold self-start">${day}</span>
                        ${tasksHtml}
                    </div>
                `;
            }
        }

        function toggleStatus(taskId, platformId, isChecked) {
            const task = appData.tasks.find(t => t.id === taskId);
            if (task) { task.status[platformId] = isChecked; save(); }
        }

        function addVideoTask() {
            const t = document.getElementById('new-video-title');
            const d = document.getElementById('new-video-date');
            if (!t.value || !d.value) return;
            appData.tasks.push({ id: Date.now(), title: t.value, date: d.value, status: {yt:false, tt:false, ig:false, fb:false, pin:false} });
            save(); t.value = ''; renderCalendar();
        }

        function changeMonth(dir) {
            currentViewDate.setMonth(currentViewDate.getMonth() + dir);
            renderCalendar();
        }

        function save() { localStorage.setItem('abcyara_v5', JSON.stringify(appData)); }

        document.getElementById('new-video-date').valueAsDate = new Date();
        renderStudioLinks();
        renderCalendar();
    </script>
</body>
</html>
