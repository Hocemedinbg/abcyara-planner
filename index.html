<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abcyara Hub - Production & Stratégie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .social-checkbox { display: none; }
        .social-label { cursor: pointer; transition: 0.2s; opacity: 0.2; filter: grayscale(100%); }
        .social-checkbox:checked + .social-label { opacity: 1; filter: grayscale(0%); transform: scale(1.1); }
        .yt-icon { color: #FF0000; } .tt-icon { color: #000000; } .ig-icon { color: #E1306C; }
        .fb-icon { color: #1877F2; } .pin-icon { color: #E60023; }
        .custom-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 p-4 shadow-sm sticky top-0 z-30">
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                    <i class="fa-solid fa-rocket"></i> Abcyara Hub
                </h1>
                <span class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full font-bold">ÉDITION ÉDUCATIVE</span>
            </div>
            
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-100 rounded-lg p-3">
                <h3 class="text-xs font-bold text-blue-800 mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-lightbulb text-yellow-500 animate-pulse"></i> STRATÉGIE DE PUBLICATION
                </h3>
                <div class="grid grid-cols-2 gap-2 text-[10px]">
                    <div class="bg-white/50 p-2 rounded">
                        <p class="text-blue-900 font-bold"><i class="fa-solid fa-clock mr-1"></i> Horaires</p>
                        <p>07:00 (Réveil) / 17:00 (Goûter)</p>
                    </div>
                    <div class="bg-white/50 p-2 rounded">
                        <p class="text-blue-900 font-bold"><i class="fa-solid fa-video mr-1"></i> Longueur</p>
                        <p>15 à 30 sec (Engagement Max)</p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="p-4 bg-white border-b border-gray-200 shadow-sm">
        <div class="flex flex-col gap-3">
            <input type="text" id="new-video-title" placeholder="Titre (ex: Les Fruits 🍎)" class="border p-3 rounded-lg text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-indigo-200 outline-none transition-all">
            <div class="flex gap-2">
                <input type="date" id="new-video-date" class="border p-3 rounded-lg text-sm flex-1 bg-gray-50 outline-none">
                <button onclick="addVideoTask()" class="bg-indigo-600 text-white px-6 py-3 rounded-lg text-sm font-bold shadow-md active:scale-95 transition-transform">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </div>
        </div>
    </section>

    <main class="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
        <div class="flex justify-between items-center px-1">
            <h2 id="month-display" class="font-black text-gray-700 uppercase tracking-tighter">Mois Année</h2>
            <div class="flex gap-1">
                <button onclick="changeMonth(-1)" class="p-2 bg-white border rounded-lg shadow-sm active:bg-gray-100"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="changeMonth(1)" class="p-2 bg-white border rounded-lg shadow-sm active:bg-gray-100"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

        <div class="flex-1 overflow-auto custom-scroll bg-white rounded-2xl shadow-xl border border-gray-200">
            <div class="grid grid-cols-7 border-b bg-gray-50/80 backdrop-blur-sm text-[9px] font-black text-center py-3 sticky top-0 z-10">
                <div class="text-red-400">LUN</div><div>MAR</div><div>MER</div><div>JEU</div><div>VEN</div><div class="text-indigo-500">SAM</div><div class="text-indigo-500">DIM</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7">
                </div>
        </div>
    </main>

    <nav class="bg-white border-t border-gray-200 p-3 shrink-0 flex gap-2 overflow-x-auto custom-scroll" id="studio-nav">
        </nav>

    <script>
        const platforms = [
            { id: 'yt', name: 'YouTube', icon: 'fa-brands fa-youtube yt-icon', url: "https://studio.youtube.com" },
            { id: 'tt', name: 'TikTok', icon: 'fa-brands fa-tiktok tt-icon', url: "https://www.tiktok.com/creators/creator-portal/" },
            { id: 'ig', name: 'Insta', icon: 'fa-brands fa-instagram ig-icon', url: "https://business.facebook.com/creatorstudio/home" },
            { id: 'fb', name: 'FB', icon: 'fa-brands fa-facebook fb-icon', url: "https://business.facebook.com/" },
            { id: 'pin', name: 'Pin', icon: 'fa-brands fa-pinterest pin-icon', url: "https://www.pinterest.com/business/hub/" }
        ];

        let appData = JSON.parse(localStorage.getItem('abcyara_v6')) || { tasks: [] };
        let currentViewDate = new Date();

        function renderStudioNav() {
            const nav = document.getElementById('studio-nav');
            nav.innerHTML = platforms.map(p => `
                <a href="${p.url}" target="_blank" class="flex-shrink-0 bg-gray-50 border border-gray-200 px-4 py-2 rounded-full flex items-center gap-2 text-[10px] font-bold shadow-sm">
                    <i class="${p.icon}"></i> ${p.name}
                </a>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            monthDisplay.innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < startOffset; i++) {
                grid.innerHTML += `<div class="border-b border-r border-gray-50 min-h-[100px] bg-gray-50/30"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const dayTasks = appData.tasks.filter(t => t.date === dateStr);
                
                let tasksHtml = dayTasks.map(task => `
                    <div class="mt-1 bg-white border border-indigo-100 shadow-sm rounded-lg p-1 group relative">
                        <button onclick="deleteTask(${task.id})" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-3 h-3 text-[8px] opacity-0 group-hover:opacity-100 transition-opacity">×</button>
                        <div class="text-[8px] font-bold text-gray-700 truncate leading-tight mb-1">${task.title}</div>
                        <div class="flex justify-between px-0.5">
                            ${platforms.map(p => `
                                <input type="checkbox" id="c-${task.id}-${p.id}" class="social-checkbox" ${task.status[p.id] ? 'checked' : ''} onchange="toggleStatus(${task.id}, '${p.id}', this.checked)">
                                <label for="c-${task.id}-${p.id}" class="social-label text-[10px]"><i class="${p.icon}"></i></label>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="border-b border-r border-gray-100 min-h-[110px] p-1 flex flex-col bg-white ${isToday ? 'ring-2 ring-inset ring-indigo-500/20' : ''}">
                        <span class="text-[10px] font-black ${isToday ? 'bg-indigo-600 text-white w-5 h-5 flex items-center justify-center rounded-full' : 'text-gray-300'} mb-1">${day}</span>
                        <div class="flex-1 overflow-y-auto custom-scroll">${tasksHtml}</div>
                    </div>
                `;
            }
        }

        function toggleStatus(taskId, platformId, isChecked) {
            const task = appData.tasks.find(t => t.id === taskId);
            if (task) { task.status[platformId] = isChecked; save(); }
        }

        function addVideoTask() {
            const t = document.getElementById('new-video-title');
            const d = document.getElementById('new-video-date');
            if (!t.value || !d.value) return;
            appData.tasks.push({ id: Date.now(), title: t.value, date: d.value, status: {yt:false, tt:false, ig:false, fb:false, pin:false} });
            save(); t.value = ''; renderCalendar();
        }

        function deleteTask(id) {
            if(confirm('Supprimer cette vidéo ?')) {
                appData.tasks = appData.tasks.filter(t => t.id !== id);
                save(); renderCalendar();
            }
        }

        function changeMonth(dir) {
            currentViewDate.setMonth(currentViewDate.getMonth() + dir);
            renderCalendar();
        }

        function save() { localStorage.setItem('abcyara_v6', JSON.stringify(appData)); }

        document.getElementById('new-video-date').valueAsDate = new Date();
        renderStudioNav();
        renderCalendar();
    </script>
</body>
</html>
