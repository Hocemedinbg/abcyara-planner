<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abcyara Hub - Dashboard Stratégique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .social-checkbox { display: none; }
        .social-label { cursor: pointer; transition: 0.2s; opacity: 0.2; filter: grayscale(100%); }
        .social-checkbox:checked + .social-label { opacity: 1; filter: grayscale(0%); transform: scale(1.2); }
        .yt-icon { color: #FF0000; } .tt-icon { color: #000000; } .ig-icon { color: #E1306C; }
        .fb-icon { color: #1877F2; } .pin-icon { color: #E60023; }
        .custom-scroll::-webkit-scrollbar { height: 5px; width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        @media (min-width: 1024px) { .main-grid { grid-template-columns: 400px 1fr; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-sm border border-indigo-100">
            <h3 class="font-bold text-lg mb-4 text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square"></i> Modifier la publication
            </h3>
            <input type="hidden" id="edit-task-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Titre de la vidéo</label>
                    <input type="text" id="edit-task-title" class="w-full border border-slate-200 p-3 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-indigo-400 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-1">Date de publication</label>
                    <input type="date" id="edit-task-date" class="w-full border border-slate-200 p-3 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-indigo-400 outline-none">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-6">
                <button onclick="closeEditModal()" class="px-4 py-2 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">Annuler</button>
                <button onclick="saveEditTask()" class="px-6 py-2 text-sm font-bold bg-indigo-600 text-white rounded-xl shadow-lg active:scale-95 transition-all">Mettre à jour</button>
            </div>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-40 shadow-sm">
        <div class="max-w-[1800px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white shadow-indigo-200 shadow-lg">
                    <i class="fa-solid fa-rocket text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black text-slate-900 leading-none">Abcyara Hub</h1>
                    <p class="text-[10px] font-bold text-indigo-500 tracking-widest uppercase mt-1">Édition Tunisie • UTC+1</p>
                </div>
            </div>
            <div id="studio-nav" class="hidden md:flex gap-2"></div>
        </div>
    </header>

    <div class="max-w-[1800px] mx-auto p-4 main-grid grid gap-6">
        
        <aside class="space-y-6">
            
            <section class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200">
                <h2 class="text-sm font-black text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fa-solid fa-plus-circle text-indigo-500"></i> Planifier une vidéo
                </h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="new-video-title" placeholder="Titre (ex: Les Couleurs 🎨)" class="border border-slate-200 p-3 rounded-xl text-sm bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                    <div class="flex gap-2">
                        <input type="date" id="new-video-date" class="border border-slate-200 p-3 rounded-xl text-sm flex-1 bg-slate-50 outline-none">
                        <button onclick="addVideoTask()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-3 rounded-xl shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </section>

            <section class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200">
                <h2 class="text-sm font-black text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fa-solid fa-gears text-indigo-500"></i> Configurer les Studios
                </h2>
                <div id="config-links" class="space-y-2">
                    </div>
            </section>

            <section class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 overflow-hidden text-[11px]">
                <h2 class="text-sm font-black text-slate-700 mb-4 flex items-center gap-2 uppercase tracking-tighter">
                    <i class="fa-solid fa-chart-line text-green-500"></i> Recommandations
                </h2>
                <div class="space-y-2">
                    <div class="p-2 rounded-xl bg-red-50 border border-red-100 flex justify-between items-center">
                        <span class="font-bold text-red-700">YouTube</span>
                        <span class="font-black opacity-60 italic">16h - 19h</span>
                    </div>
                    <div class="p-2 rounded-xl bg-slate-100 border border-slate-200 flex justify-between items-center">
                        <span class="font-bold text-slate-800">TikTok</span>
                        <span class="font-black opacity-60 italic">12h-14h / 19h-22h</span>
                    </div>
                    <div class="p-2 rounded-xl bg-pink-50 border border-pink-100 flex justify-between items-center">
                        <span class="font-bold text-pink-700">Instagram</span>
                        <span class="font-black opacity-60 italic">13h-15h / 20h-22h</span>
                    </div>
                </div>
            </section>
        </aside>

        <section class="flex flex-col gap-4">
            <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                <h2 id="month-display" class="font-black text-slate-800 uppercase tracking-tighter text-xl leading-none">---</h2>
                <div class="flex gap-2">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 border border-slate-200 rounded-xl hover:bg-white transition-all"><i class="fa-solid fa-chevron-left"></i></button>
                    <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-slate-50 border border-slate-200 rounded-xl hover:bg-white transition-all"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden flex-1 flex flex-col min-h-[600px]">
                <div class="grid grid-cols-7 bg-slate-50 border-b border-slate-200 text-[10px] font-black text-center py-4 text-slate-400 uppercase tracking-widest">
                    <div>LUN</div><div>MAR</div><div>MER</div><div>JEU</div><div>VEN</div><div class="text-indigo-500">SAM</div><div class="text-indigo-500">DIM</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 flex-1"></div>
            </div>
            
            <div id="studio-nav-mobile" class="md:hidden flex gap-2 overflow-x-auto pb-2 custom-scroll"></div>
        </section>
    </div>

    <script>
        // Configuration initiale par défaut
        const defaultPlatforms = [
            { id: 'yt', name: 'YouTube', icon: 'fa-brands fa-youtube yt-icon', url: "https://studio.youtube.com" },
            { id: 'tt', name: 'TikTok', icon: 'fa-brands fa-tiktok tt-icon', url: "https://www.tiktok.com/creators/creator-portal/" },
            { id: 'ig', name: 'Insta', icon: 'fa-brands fa-instagram ig-icon', url: "https://business.facebook.com/creatorstudio/home" },
            { id: 'fb', name: 'FB', icon: 'fa-brands fa-facebook fb-icon', url: "https://business.facebook.com/" },
            { id: 'pin', name: 'Pin', icon: 'fa-brands fa-pinterest pin-icon', url: "https://www.pinterest.com/business/hub/" }
        ];

        // Chargement des données (V8 + Plateformes configurables)
        let appData = JSON.parse(localStorage.getItem('abcyara_v8')) || { tasks: [] };
        let platforms = JSON.parse(localStorage.getItem('abcyara_platforms')) || defaultPlatforms;
        let currentViewDate = new Date();

        // Rendu des liens Studio (Barre de navigation)
        function renderStudioNav() {
            const html = platforms.map(p => `
                <a href="${p.url}" target="_blank" class="bg-white border border-slate-200 px-4 py-2 rounded-xl flex items-center gap-2 text-[10px] font-black shadow-sm hover:shadow-md hover:border-indigo-300 transition-all text-slate-600">
                    <i class="${p.icon}"></i> ${p.name}
                </a>
            `).join('');
            document.getElementById('studio-nav').innerHTML = html;
            document.getElementById('studio-nav-mobile').innerHTML = html;
        }

        // Rendu du formulaire de configuration des liens
        function renderConfigLinks() {
            const container = document.getElementById('config-links');
            container.innerHTML = platforms.map(p => `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100">
                    <div class="w-8 flex justify-center text-sm"><i class="${p.icon}"></i></div>
                    <input type="text" value="${p.url}" 
                        onchange="updatePlatformUrl('${p.id}', this.value)"
                        placeholder="Lien ${p.name}"
                        class="flex-1 bg-transparent text-[10px] outline-none border-b border-transparent focus:border-indigo-400 font-medium">
                </div>
            `).join('');
        }

        function updatePlatformUrl(id, newUrl) {
            const plat = platforms.find(p => p.id === id);
            if (plat) {
                plat.url = newUrl;
                localStorage.setItem('abcyara_platforms', JSON.stringify(platforms));
                renderStudioNav(); // Mise à jour immédiate des liens cliquables
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthDisplay = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            monthDisplay.innerText = new Intl.DateTimeFormat('fr-FR', { month: 'long', year: 'numeric' }).format(currentViewDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < startOffset; i++) {
                grid.innerHTML += `<div class="border-b border-r border-slate-100 bg-slate-50/50"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = new Date().toISOString().split('T')[0] === dateStr;
                const dayTasks = appData.tasks.filter(t => t.date === dateStr);
                
                let tasksHtml = dayTasks.map(task => `
                    <div class="mt-2 bg-white border border-slate-200 rounded-xl p-2 group relative cursor-pointer hover:border-indigo-400 hover:shadow-md transition-all" onclick="openEditModal(${task.id})">
                        <button onclick="event.stopPropagation(); deleteTask(${task.id})" class="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full w-5 h-5 text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10 shadow-lg border border-white">×</button>
                        <div class="text-[9px] font-bold text-slate-800 truncate mb-2">${task.title}</div>
                        <div class="flex justify-between" onclick="event.stopPropagation()">
                            ${platforms.map(p => `
                                <div class="flex flex-col items-center">
                                    <input type="checkbox" id="c-${task.id}-${p.id}" class="social-checkbox" ${task.status[p.id] ? 'checked' : ''} onchange="toggleStatus(${task.id}, '${p.id}', this.checked)">
                                    <label for="c-${task.id}-${p.id}" class="social-label text-[10px]"><i class="${p.icon}"></i></label>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                grid.innerHTML += `
                    <div class="border-b border-r border-slate-100 min-h-[120px] p-2 flex flex-col bg-white ${isToday ? 'ring-2 ring-inset ring-indigo-500/20 bg-indigo-50/30' : ''}">
                        <span class="text-[11px] font-black ${isToday ? 'bg-indigo-600 text-white w-6 h-6 flex items-center justify-center rounded-lg shadow-lg' : 'text-slate-300'}">${day}</span>
                        <div class="flex-1 overflow-y-auto custom-scroll mt-1">${tasksHtml}</div>
                    </div>
                `;
            }
        }

        // Fonctions de gestion des tâches
        function openEditModal(taskId) {
            const task = appData.tasks.find(t => t.id === taskId);
            if (task) {
                document.getElementById('edit-task-id').value = task.id;
                document.getElementById('edit-task-title').value = task.title;
                document.getElementById('edit-task-date').value = task.date;
                document.getElementById('edit-modal').classList.remove('hidden');
            }
        }
        function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }
        function saveEditTask() {
            const id = parseInt(document.getElementById('edit-task-id').value);
            const idx = appData.tasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                appData.tasks[idx].title = document.getElementById('edit-task-title').value;
                appData.tasks[idx].date = document.getElementById('edit-task-date').value;
                save(); closeEditModal(); renderCalendar();
            }
        }
        function toggleStatus(taskId, platformId, isChecked) {
            const task = appData.tasks.find(t => t.id === taskId);
            if (task) { task.status[platformId] = isChecked; save(); }
        }
        function addVideoTask() {
            const t = document.getElementById('new-video-title');
            const d = document.getElementById('new-video-date');
            if (!t.value || !d.value) return;
            appData.tasks.push({ id: Date.now(), title: t.value, date: d.value, status: {yt:false, tt:false, ig:false, fb:false, pin:false} });
            save(); t.value = ''; renderCalendar();
        }
        function deleteTask(id) {
            if(confirm('Supprimer ?')) { appData.tasks = appData.tasks.filter(t => t.id !== id); save(); renderCalendar(); }
        }
        function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderCalendar(); }
        function save() { localStorage.setItem('abcyara_v8', JSON.stringify(appData)); }

        // Initialisation
        document.getElementById('new-video-date').valueAsDate = new Date();
        renderStudioNav();
        renderConfigLinks();
        renderCalendar();
    </script>
</body>
</html>
